<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam Trading Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Navigation */
        .nav-container { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-btn { background: #334155; color: #fff; padding: 10px; flex: 1; min-width: 45px; font-size: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn.active { background: var(--primary); color: #000; }
        
        /* Video Area */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; margin: 15px 0; border: 1px solid #334155; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Main Buttons */
        .action-btn { background: var(--primary); color: #0f172a; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; }
        .action-btn:active { opacity: 0.8; transform: scale(0.98); }
        .screenshot-btn { background: var(--accent); color: #000; margin-top: 15px; }

        .user-id { font-size: 14px; margin-bottom: 15px; color: var(--primary); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--primary); margin-bottom: 5px;">Fx Karam Academy</h2>
        <div class="user-id">Student ID: <span id="user-id-display">Loading...</span></div>

        <div class="nav-container">
            <button class="nav-btn active" id="n1" onclick="showLesson(1)">L-1</button>
            <button class="nav-btn" id="n2" onclick="showLesson(2)">L-2</button>
            <button class="nav-btn" id="n3" onclick="showLesson(3)">L-3</button>
            <button class="nav-btn" id="n4" onclick="showLesson(4)">L-4</button>
            <button class="nav-btn" id="n5" onclick="showLesson(5)">L-5</button>
            <button class="nav-btn" id="n6" onclick="showLesson(6)">L-6</button>
            <button class="nav-btn" id="n7" onclick="showLesson(7)">L-7</button>
        </div>

        <div id="lesson-content">
            <h3 id="lesson-title" style="margin: 10px 0;">Lesson 1: Market Structure</h3>
            <div class="video-container">
                <iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <button class="action-btn" onclick="takeQuiz()">Take Quiz</button>
            
            <hr style="margin: 20px 0; opacity: 0.2;">
            
            <p style="font-size: 12px; margin-bottom: 5px; opacity: 0.8;">Screenshot ရိုက်ပြီးပါက အောက်ပါခလုတ်ကိုနှိပ်၍ ပို့ရန်</p>
            <button class="action-btn screenshot-btn" onclick="goToGroup()">📸 Screenshot ပို့ရန်</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok", 
            authDomain: "trading-app-69b9d.firebaseapp.com", 
            projectId: "trading-app-69b9d", 
            storageBucket: "trading-app-69b9d.appspot.com", 
            messagingSenderId: "573273662231", 
            appId: "1:573273662231:web:fbbbc6876711e612190829" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        let myUserId = tg.initDataUnsafe?.user?.id?.toString() || "2020089609";
        document.getElementById('user-id-display').innerText = myUserId;

        const vids = ["jyad4g6F8FU", "DDLsFro2bpc", "DwP9zFAC5EA", "L_zlR6ZxXNg", "GoRcLqAsYUg", "n7owfWxBxmw", "nYuowB5Wyts"];
        const titles = ["Market Structure", "Order Blocks", "Liquidity", "Fair Value Gaps", "Timeframe Correlation", "Risk Management", "Trading Psychology"];

        window.showLesson = (n) => {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('n' + n).classList.add('active');
            document.getElementById('lesson-title').innerText = "Lesson " + n + ": " + titles[n-1];
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + vids[n-1];
        };

        window.takeQuiz = async () => {
            const userRef = doc(db, "users", myUserId);
            const userSnap = await getDoc(userRef);
            let currentScore = userSnap.exists() ? (userSnap.data().total_score || 0) : 0;
            
            await setDoc(userRef, { total_score: currentScore + 5 }, { merge: true });
            alert("Quiz Completed! ၅ မှတ် ပေါင်းထည့်လိုက်ပါပြီ။");
        };

        // Group ဆီသို့ တန်းခေါ်သွားမည့် Function
        window.goToGroup = () => {
            const groupLink = "https://t.me/+cbvtPsUU2gExYmY1";
            tg.openTelegramLink(groupLink);
        };

        showLesson(1);
        tg.expand();
    </script>
</body>
</html>
