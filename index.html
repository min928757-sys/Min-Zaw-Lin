<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam Trading Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        /* Rank Badge Style */
        .rank-badge { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; border: 2px solid var(--primary); }
        .badge-gold { background: linear-gradient(135deg, #f59e0b, #d97706); border-color: #facc15; }
        
        .nav-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .nav-btn { background: #334155; color: #fff; padding: 10px 5px; font-size: 11px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--primary); color: #000; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; margin: 15px 0; border: 2px solid #334155; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .action-btn { background: var(--primary); color: #0f172a; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; }
        .hidden { display: none !important; }
        
        /* Quiz Styles */
        .option-btn { background: #334155; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; border: 1px solid #475569; text-align: left; cursor: pointer; display: block; }
        .correct { background: #10b981 !important; border-color: #059669 !important; }
        .wrong { background: #ef4444 !important; border-color: #dc2626 !important; }

        .rank-table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        .rank-table th, .rank-table td { padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--primary); margin:0;">Fx Karam Academy</h2>
        <div id="user-rank-display" class="rank-badge">Trader Level: Loading...</div>

        <div class="nav-container">
            <button class="nav-btn active" id="n1" onclick="showLesson(1)">L-1</button>
            <button class="nav-btn" id="n2" onclick="showLesson(2)">L-2</button>
            <button class="nav-btn" id="n3" onclick="showLesson(3)">L-3</button>
            <button class="nav-btn" id="n4" onclick="showLesson(4)">L-4</button>
            <button class="nav-btn" id="n5" onclick="showLesson(5)">L-5</button>
            <button class="nav-btn" id="n6" onclick="showLesson(6)">L-6</button>
            <button class="nav-btn" id="n7" onclick="showLesson(7)">L-7</button>
            <button class="nav-btn" style="background:var(--accent); color:#000;" onclick="showRank()">Rank</button>
        </div>

        <div id="lesson-view">
            <h3 id="l-title">Lesson 1: Market Structure</h3>
            <div class="video-container"><iframe id="v-frame" src="" frameborder="0" allowfullscreen></iframe></div>
            <button class="action-btn" onclick="startQuiz()">Take Lesson Quiz</button>
        </div>

        <div id="quiz-view" class="hidden">
            <h3 id="q-title" style="color:var(--primary);">Quiz</h3>
            <p id="q-text" style="font-weight:bold; margin-bottom:20px;">Question here?</p>
            <div id="options-box"></div>
        </div>

        <div id="rank-view" class="hidden">
            <h3 style="color:var(--accent);">🏆 Top 10 Traders</h3>
            <table class="rank-table">
                <thead><tr><th>Rank</th><th>User</th><th>Score</th></tr></thead>
                <tbody id="rank-body"></tbody>
            </table>
            <button class="action-btn" onclick="showLesson(1)">Back to Academy</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok", authDomain: "trading-app-69b9d.firebaseapp.com", projectId: "trading-app-69b9d", storageBucket: "trading-app-69b9d.appspot.com", messagingSenderId: "573273662231", appId: "1:573273662231:web:fbbbc6876711e612190829" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let myUserId = tg.initDataUnsafe?.user?.id?.toString() || "2020089609";
        let currentL = 1;
        const vids = ["jyad4g6F8FU", "DDLsFro2bpc", "DwP9zFAC5EA", "L_zlR6ZxXNg", "GoRcLqAsYUg", "n7owfWxBxmw", "nYuowB5Wyts"];
        const titles = ["Market Structure", "Order Blocks", "Liquidity", "Fair Value Gaps", "Timeframe Correlation", "Risk Management", "Trading Psychology"];

        // Quiz Questions Data
        const questions = {
            1: { q: "Uptrend မှာ Previous High ကို ဖောက်ထွက်သွားတာကို ဘယ်လိုခေါ်သလဲ?", a: ["BOS", "CHoCH", "Liquidity"], c: 0 },
            2: { q: "Bullish Order Block ကို ဘယ်နေရာမှာ ရှာရမလဲ?", a: ["Supply Zone", "ဈေးမတက်ခင် နောက်ဆုံးကျခဲ့တဲ့ Candle", "Market Gap"], c: 1 },
            3: { q: "Stop Loss များ စုပုံနေသောနေရာကို ဘယ်လိုခေါ်သလဲ?", a: ["BOS", "Order Block", "Liquidity"], c: 2 },
            4: { q: "FVG ကို Candle ဘယ်နှခုနဲ့ ကြည့်ရသလဲ?", a: ["၂ ခု", "၃ ခု", "၄ ခု"], c: 1 },
            5: { q: "Daily Timeframe ကို ဘာအတွက် အဓိကသုံးသလဲ?", a: ["Execution", "Trend Direction သိရန်", "Entry ရှာရန်"], c: 1 },
            6: { q: "Trading မှာ ၁ အော်ဒါကို အရင်းအနှီးရဲ့ ဘယ်လောက်ပဲ ရှုံးခံသင့်သလဲ?", a: ["၁ ရာခိုင်နှုန်း", "၁၀ ရာခိုင်နှုန်း", "၅၀ ရာခိုင်နှုန်း"], c: 0 },
            7: { q: "ရှုံးသွားတဲ့ငွေကို ဇွတ်ပြန်ရအောင် လုပ်တာကို ဘယ်လိုခေါ်သလဲ?", a: ["Scalping", "Revenge Trading", "Swing Trading"], c: 1 }
        };

        window.showLesson = (n) => {
            currentL = n;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n'+n).classList.add('active');
            document.getElementById('l-title').innerText = `Lesson ${n}: ${titles[n-1]}`;
            document.getElementById('v-frame').src = "https://www.youtube.com/embed/" + vids[n-1];
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('rank-view').classList.add('hidden');
            updateBadge();
        };

        window.startQuiz = () => {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            const data = questions[currentL];
            document.getElementById('q-title').innerText = `Quiz: Lesson ${currentL}`;
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('options-box');
            box.innerHTML = "";
            data.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAns(i, data.c);
                box.appendChild(btn);
            });
        };

        async function checkAns(idx, correct) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.onclick = null); // Stop clicking
            if(idx === correct) {
                btns[idx].classList.add('correct');
                const userRef = doc(db, "users", myUserId);
                const userSnap = await getDoc(userRef);
                let total = 5;
                if(userSnap.exists()) total = (userSnap.data().total_score || 0) + 5;
                await setDoc(userRef, { total_score: total }, { merge: true });
                setTimeout(() => { alert("မှန်ကန်ပါတယ်! ၅ မှတ် ထပ်တိုးလိုက်ပါပြီ။"); showLesson(currentL); }, 500);
            } else {
                btns[idx].classList.add('wrong');
                btns[correct].classList.add('correct');
                setTimeout(() => { alert("မှားသွားပါတယ်၊ ပြန်ကြိုးစားကြည့်ပါ။"); showLesson(currentL); }, 1000);
            }
        }

        async function updateBadge() {
            const userSnap = await getDoc(doc(db, "users", myUserId));
            const score = userSnap.exists() ? (userSnap.data().total_score || 0) : 0;
            const display = document.getElementById('user-rank-display');
            if(score >= 35) { display.innerText = "🏆 Professional Trader"; display.className = "rank-badge badge-gold"; }
            else if(score >= 20) { display.innerText = "⭐ Advanced Trader"; display.className = "rank-badge"; }
            else if(score >= 5) { display.innerText = "📈 Junior Trader"; display.className = "rank-badge"; }
            else { display.innerText = "🌱 Newbie Trader"; display.className = "rank-badge"; }
        }

        window.showRank = async () => {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('rank-view').classList.remove('hidden');
            const q = query(collection(db, "users"), orderBy("total_score", "desc"), limit(10));
            const snap = await getDocs(q);
            const tbody = document.getElementById('rank-body');
            tbody.innerHTML = "";
            let i = 1;
            snap.forEach(d => {
                tbody.innerHTML += `<tr><td>${i}</td><td>${d.id.slice(0,4)}***</td><td>${d.data().total_score || 0}</td></tr>`;
                i++;
            });
        };

        showLesson(1);
    </script>
</body>
</html>
