<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        .status-box { margin: 20px 0; padding: 15px; border-radius: 8px; font-weight: bold; }
        .pending { background-color: #f59e0b; color: #ffffff; }
        .approved { background-color: #10b981; color: #ffffff; }
        .hidden { display: none; }
        .video-container { margin-top: 20px; border: 2px solid #38bdf8; border-radius: 10px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0ea5e9; }
        .copy-btn { width: auto; padding: 5px 15px; font-size: 12px; margin-left: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Trading Academy</h1>
        <p>User ID: <span id="user-id-display" style="font-weight: bold; color: #38bdf8;">Loading...</span> 
           <button onclick="copyID()" class="copy-btn">Copy ID</button>
        </p>

        <hr style="border: 0.5px solid #334155; margin: 20px 0;">

        <div id="locked-section">
            <div class="status-box pending">Approval လိုအပ်ပါသည်</div>
            <p>သင်ခန်းစာများလေ့လာရန် KPay ဖြင့် ငွေလွှဲပြီး Screenshot ပို့ပေးပါ။</p>
            <p>KPay Number: <b>09456507877</b></p>
            <button onclick="window.open('https://t.me/@Karam4565')">Screenshot ပို့ရန်</button>
        </div>

        <div id="unlocked-section" class="hidden">
            <div class="status-box approved">Welcome, Trader! ✅</div>
            <h3>Lesson 1: Market Structure (The Foundation)</h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/jyad4g6F8FU" frameborder="0" allowfullscreen></iframe>
            </div>
            <p style="margin-top: 15px; color: #cbd5e1;">ဗီဒီယိုကြည့်ပြီးပါက Quiz ဖြေဆိုနိုင်ပါပြီ...</p>
            <button onclick="alert('Quiz coming soon!')" style="background: #10b981;">Take Quiz</button>
        </div>
    </div>

    <script>
        function copyID() {
            const id = document.getElementById('user-id-display').innerText;
            navigator.clipboard.writeText(id);
            alert("ID: " + id + " ကို Copy ကူးပြီးပါပြီ။ Admin ဆီ ပို့ပေးပါ။");
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok",
            authDomain: "trading-app-69b9d.firebaseapp.com",
            projectId: "trading-app-69b9d",
            storageBucket: "trading-app-69b9d.appspot.com",
            messagingSenderId: "573273662231",
            appId: "1:573273662231:web:fbbbc6876711e612190829"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Telegram WebApp Setup
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let myUserId = "Guest";
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            myUserId = tg.initDataUnsafe.user.id.toString();
        }
        
        document.getElementById('user-id-display').innerText = myUserId;

        if (myUserId !== "Guest") {
            const userRef = doc(db, "users", myUserId);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().is_approved === true) {
                    document.getElementById('locked-section').classList.add('hidden');
                    document.getElementById('unlocked-section').classList.remove('hidden');
                } else {
                    document.getElementById('locked-section').classList.remove('hidden');
                    document.getElementById('unlocked-section').classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
