<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fx Karam Trading Academy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; }
        .hidden { display: none !important; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        /* Certificate Design */
        #certificate-area { background: white; color: #0f172a; padding: 30px; border: 10px double #0369a1; border-radius: 5px; margin: 20px auto; width: 85%; }
        .cert-name { font-size: 24px; font-weight: bold; color: #0369a1; border-bottom: 2px solid #0f172a; display: inline-block; padding: 0 10px; margin: 15px 0; }
        
        .nav-container { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-btn { background: #334155; color: #fff; padding: 8px; flex: 1; min-width: 40px; font-size: 12px; border-radius: 5px; border: none; }
        .nav-btn.active { background: var(--primary); color: #000; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--primary);">Fx Karam Academy</h2>
        <p>User ID: <span id="user-id-display">Loading...</span></p>

        <div id="unlocked-section">
            <div class="nav-container">
                <button class="nav-btn active" onclick="showLesson(1)">L-1</button>
                <button class="nav-btn" onclick="showLesson(2)">L-2</button>
                <button class="nav-btn" onclick="showLesson(3)">L-3</button>
                <button class="nav-btn" onclick="showLesson(4)">L-4</button>
                <button class="nav-btn" onclick="showLesson(5)">L-5</button>
                <button class="nav-btn" onclick="showLesson(6)">L-6</button>
                <button class="nav-btn" onclick="showLesson(7)">L-7</button>
                <button class="nav-btn" onclick="generateCertificate()" style="background:#facc15; color:#000;">Cert</button>
            </div>

            <div id="lesson-view">
                <h3 id="lesson-title">Lesson 1</h3>
                <div class="video-container"><iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe></div>
                <button onclick="alert('Quiz system is ready!')">Take Quiz</button>
            </div>

            <div id="certificate-wrap" class="hidden">
                <div id="certificate-area">
                    <h2 style="margin:0;">CERTIFICATE</h2>
                    <p style="font-size:12px; color:#64748b;">OF COMPLETION</p>
                    <p style="font-size:14px;">This is to certify that</p>
                    <div class="cert-name" id="cert-user-id">---</div>
                    <p style="font-size:14px;">has completed the</p>
                    <p><b>ICT/SMC FOUNDATION COURSE</b></p>
                    <h3 id="cert-total-score" style="color: #10b981;">Score: 0 / 35</h3>
                    <p style="color: #0369a1; font-weight: bold;">FX KARAM ACADEMY</p>
                </div>
                <button id="download-btn" onclick="downloadCert()" style="background:#10b981; color:white;">⬇️ Save to Device</button>
                <button onclick="location.reload()" style="background:#64748b;">Back</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA5wJhY38C5GMgxjJuGDDejtIje36MvBok", authDomain: "trading-app-69b9d.firebaseapp.com", projectId: "trading-app-69b9d", storageBucket: "trading-app-69b9d.appspot.com", messagingSenderId: "573273662231", appId: "1:573273662231:web:fbbbc6876711e612190829" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        let myUserId = tg.initDataUnsafe?.user?.id?.toString() || "2020089609";
        document.getElementById('user-id-display').innerText = myUserId;

        window.showLesson = (n) => {
            const vids = ["jyad4g6F8FU", "DDLsFro2bpc", "DwP9zFAC5EA", "L_zlR6ZxXNg", "GoRcLqAsYUg", "n7owfWxBxmw", "nYuowB5Wyts"];
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + vids[n-1];
            document.getElementById('certificate-wrap').classList.add('hidden');
            document.getElementById('lesson-view').classList.remove('hidden');
        };
        showLesson(1);

        // Score ကို Firebase ကနေ တိုက်ရိုက်ဆွဲထုတ်ပြီး Cert ထုတ်ပေးတဲ့ Function
        window.generateCertificate = async () => {
            const userDoc = await getDoc(doc(db, "users", myUserId));
            let finalScore = 0;
            if (userDoc.exists()) {
                finalScore = userDoc.data().total_score || 0;
            }
            
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('certificate-wrap').classList.remove('hidden');
            document.getElementById('cert-user-id').innerText = myUserId;
            document.getElementById('cert-total-score').innerText = "Total Score: " + finalScore + " / 35";
        };

        // Download Logic အသစ် (Direct Link Method)
        window.downloadCert = () => {
            const btn = document.getElementById('download-btn');
            btn.innerText = "Processing...";
            const cert = document.getElementById('certificate-area');

            html2canvas(cert, { scale: 3, useCORS: true }).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = image;
                link.download = `FxKaram_Cert_${myUserId}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                btn.innerText = "⬇️ Save to Device";
                alert("ပုံကို ဖုန်းထဲသို့ Download ဆွဲနေပါပြီ။ မရပါက ပုံကို ဖိသိမ်းပေးပါ။");
            });
        };
    </script>
</body>
</html>
