        window.showLesson = (num) => {
            currentLesson = num;
            document.getElementById('lesson-title').innerText = "Lesson " + num + ": " + titles[num];
            document.getElementById('video-frame').src = "https://www.youtube.com/embed/" + videos[num];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-l' + num).classList.add('active');
            document.getElementById('lesson-current').classList.remove('hidden');
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('leaderboard-area').classList.add('hidden');
            document.getElementById('certificate-wrap').classList.add('hidden');
        };

        window.startQuiz = () => {
            qIdx = 0; qScore = 0;
            document.getElementById('lesson-current').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('question-container').classList.remove('hidden');
            loadQ();
        };

        function loadQ() {
            const data = questions[currentLesson][qIdx];
            document.getElementById('quiz-header').innerText = "Quiz: " + titles[currentLesson];
            document.getElementById('question-text').innerText = data.q;
            const list = document.getElementById('options-list'); list.innerHTML = "";
            document.getElementById('next-btn').classList.add('hidden');
            data.a.forEach((opt, i) => {
                const b = document.createElement('button'); b.className = "quiz-option"; b.innerText = opt;
                b.onclick = () => {
                    if (i === data.correct) { b.classList.add('correct'); qScore++; }
                    else { b.classList.add('wrong'); }
                    document.getElementById('next-btn').classList.remove('hidden');
                    document.querySelectorAll('.quiz-option').forEach(btn => btn.onclick = null);
                };
                list.appendChild(b);
            });
        }

        window.nextQuestion = () => {
            qIdx++;
            if (qIdx < 5) loadQ();
            else {
                userScores[currentLesson] = qScore;
                document.getElementById('question-container').classList.add('hidden');
                document.getElementById('quiz-result').classList.remove('hidden');
                document.getElementById('current-score-text').innerText = "Lesson " + currentLesson + " Score: " + qScore + " / 5";
                if (currentLesson === 7) {
                    document.getElementById('final-cert-btn').classList.remove('hidden');
                    saveFinalScore();
                }
            }
        };

        async function saveFinalScore() {
            let total = 0; for(let k in userScores) total += userScores[k];
            if (myUserId !== "Guest") {
                await setDoc(doc(db, "users", myUserId), { total_score: total, last_updated: new Date() }, { merge: true });
            }
        }

        window.showLeaderboard = async () => {
            document.getElementById('unlocked-section').querySelectorAll('> div').forEach(d => d.classList.add('hidden'));
            document.getElementById('main-nav').classList.remove('hidden');
            document.getElementById('leaderboard-area').classList.remove('hidden');
            
            const q = query(collection(db, "users"), orderBy("total_score", "desc"), limit(10));
            const snap = await getDocs(q);
            const tbody = document.getElementById('leaderboard-body'); tbody.innerHTML = "";
            
            let rank = 1;
            snap.forEach(doc => {
                const data = doc.data();
                if(data.total_score !== undefined) {
                    const row = document.createElement('tr');
                    if(doc.id === myUserId) row.className = "my-rank-row";
                    let icon = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
                    row.innerHTML = `<td>${icon}</td><td>${maskId(doc.id)}</td><td>${data.total_score}</td>`;
                    tbody.appendChild(row);
                    rank++;
                }
            });
        };

        window.generateCertificate = () => {
            let total = 0; for(let k in userScores) total += userScores[k];
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('certificate-wrap').classList.remove('hidden');
            document.getElementById('cert-user-id').innerText = maskId(myUserId);
            document.getElementById('cert-total-score').innerText = "Total Score: " + total + " / 35";
        };

        window.backToLessons = () => showLesson(currentLesson);

        // Approval check
        if (myUserId !== "Guest") {
            onSnapshot(doc(db, "users", myUserId), (docSnap) => {
                if (docSnap.exists() && docSnap.data().is_approved === true) {
                    document.getElementById('locked-section').classList.add('hidden');
                    document.getElementById('unlocked-section').classList.remove('hidden');
                    showLesson(1);
                }
            });
        }
    </script>
</body>
</html>
